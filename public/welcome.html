<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportFit — Welcome</title>

  <link rel="stylesheet" href="css/style.css"/>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #000000, #000000, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }

    .welcome-container {
      text-align: center;
      backdrop-filter: blur(12px);
      background: rgb(0, 0, 0);
      padding: 120px 390px;
      border-radius: 24px;
      
      animation: fadeIn 1s ease-in-out;
      max-width: 1500px;
      
    }

    .logo {
      font-size: 50px;
      font-weight: bold;
      letter-spacing: 7px;
      margin-bottom: 30px;
    }

    .tagline {
      font-size: 30px;
      opacity: 0.5;
      margin-bottom: 40px;
    }

    .arrow-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-size: 28px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,114,255,0.5);
    }

    .arrow-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 15px 40px rgba(0,114,255,0.7);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer-text {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="welcome-container">
    <div class="logo" style="font-family:'Bebas Neue',sans-serif;">SPORTFIT</div>

    <div style="font-family:'Bebas Neue',sans-serif;" class="tagline">
       Your Sport & Health Companion <br/>
      
    </div>

    <button class="arrow-btn" onclick="goNext()">→</button>

    <div class="footer-text">
      Transform your fitness journey today
    </div>
  </div>

  <script>
    function goNext() {
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
